{{- $page := .page -}}
{{- $taxonomy := .taxonomy -}}

{{- with $page.GetTerms $taxonomy -}}
  <ul>
    {{- range . -}}
      <li>
        <a href="{{ .RelPermalink }}">
          {{- if eq $taxonomy "tags" -}}#{{- end -}}{{ .LinkTitle }}
        </a>
      </li>
    {{- end -}}
  </ul>
{{- end -}}
